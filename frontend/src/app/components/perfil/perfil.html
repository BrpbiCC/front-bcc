<div class="page-container">
  <div class="page-header">
    <h2>Ajustes del Sistema</h2>
  </div>

  <div class="config-grid">
    <div class="config-card">
      <h3>Perfil del Usuario</h3>

      <div class="form-group">
        <label for="nombre">Nombre a mostrar</label>
        <input id="nombre" type="text" [(ngModel)]="nombre" />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input id="email" type="email" [(ngModel)]="email" />
      </div>

      <button class="btn-primary" (click)="guardar()">Guardar Cambios</button>
    </div>

    <div class="config-card">
      <h3>Seguridad</h3>

      <div class="form-group">
        <label for="pass-actual">Contraseña actual</label>
        <div class="password-input-wrapper">
          <input
            id="pass-actual"
            class="password-current-input"
            [type]="showCurrentPassword ? 'text' : 'password'"
            [(ngModel)]="passwordActual"
            name="passwordActual"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="password-toggle"
            [attr.aria-label]="showCurrentPassword ? 'Ocultar contraseña actual' : 'Mostrar contraseña actual'"
            [title]="showCurrentPassword ? 'Ocultar contraseña actual' : 'Mostrar contraseña actual'"
            (click)="toggleCurrentPasswordVisibility()"
          >
            <span class="material-icons" aria-hidden="true">
              {{ showCurrentPassword ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="pass-nueva">Nueva contraseña</label>
        <div class="password-input-wrapper">
          <input
            id="pass-nueva"
            [type]="showNewPassword ? 'text' : 'password'"
            [(ngModel)]="passwordNueva"
            name="passwordNueva"
            placeholder="••••••••"
            autocomplete="new-password"
          />
          <button
            type="button"
            class="password-toggle"
            [attr.aria-label]="showNewPassword ? 'Ocultar nueva contraseña' : 'Mostrar nueva contraseña'"
            [title]="showNewPassword ? 'Ocultar nueva contraseña' : 'Mostrar nueva contraseña'"
            (click)="toggleNewPasswordVisibility()"
          >
            <span class="material-icons" aria-hidden="true">
              {{ showNewPassword ? 'visibility_off' : 'visibility' }}
            </span>
          </button>
        </div>
      </div>

      <button class="btn-secondary" type="button" (click)="cambiarContrasena()">Cambiar Contraseña</button>
    </div>
  </div>
</div>
